<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>

<body>

    <div class="container-main">
        <div class="form-section">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <h2 style="color: #d4af35; margin-bottom: 10px;">BARBEARIA VIP</h2>
                    <p class="text-center-subtitle">Faça login para continuar</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" placeholder="SEUEMAIL@GMAIL.COM" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input type="password" name="password" placeholder="SENHA" required>
                    </div>
                    <button type="submit" class="btn-submit">Entrar</button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0" style="color: #1a1a1a;">Não tem uma conta? <a href="index.html">Cadastre-se</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=login`, {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'dashboard.html';
                } else {
                    alert(data.error || 'Erro no login');
                }
            } catch (err) {
                alert('Erro de conexão');
            }
        });
    </script>
</body>

</html>
