<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-color: #212529;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h3 class="fw-bold" style="color: #d4af37;">BARBEARIA VIP</h3>
                <p class="text-muted">Faça login para continuar</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="seuemail@gmail.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
            </form>

            <div class="text-center mt-3">
                <p class="mb-0">Não tem uma conta? <a href="register.html" style="color: #d4af37;">Cadastre-se</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=login`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'dashboard.html';
                } else {
                    alert(data.error || 'Erro no login');
                }
            } catch (err) {
                alert('Erro de conexão');
            }
        });
    </script>
</body>

</html>
