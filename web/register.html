<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-color: #212529;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h3 class="fw-bold" style="color: #d4af37;">CRIAR CONTA</h3>
                <p class="text-muted">Preencha os dados abaixo</p>
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="name" class="form-control" placeholder="Seu nome" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="seuemail@gmail.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="(00) 00000-0000"
                        maxlength="15" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="*********" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">Cadastrar</button>
            </form>

            <script>
                // Função simples para aplicar a máscara de telefone brasileiro
                const telInput = document.getElementById('phone');

                telInput.addEventListener('input', (e) => {
                    let value = e.target.value.replace(/\D/g, ""); // Remove tudo que não é dígito

                    if (value.length > 11) value = value.slice(0, 11); // Limita a 11 dígitos

                    // Aplica a formatação dinamicamente
                    if (value.length > 10) {
                        // Formato (99) 99999-9999
                        value = value.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
                    } else if (value.length > 6) {
                        // Formato (99) 9999-9999
                        value = value.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
                    } else if (value.length > 2) {
                        // Formato (99) 9...
                        value = value.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
                    } else if (value.length > 0) {
                        // Formato (99...
                        value = value.replace(/^(\d*)/, "($1");
                    }

                    e.target.value = value;
                });
            </script>

            <div class="text-center mt-3">
                <p class="mb-0">Já tem uma conta? <a href="login.html" style="color: #d4af37;">Faça login</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=register`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert('Cadastro realizado com sucesso! Faça login.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Erro no cadastro');
                }
            } catch (err) {
                alert('Erro de conexão');
            }
        });
    </script>
</body>

</html>
