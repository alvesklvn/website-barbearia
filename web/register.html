<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-image: url('assets/imagens/barbearia_fundo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background-color: transparent !important;
            padding: 2rem 0;
            box-shadow: none !important;
        }

        .navbar-brand {
            display: none;
        }

        .container-main {
            display: flex;
            min-height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            background-color: transparent;
        }

        /* Camada branca diagonal */
        .diagonal-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            clip-path: polygon(0 0, 35% 0, 65% 100%, 0 100%);
            z-index: 1;
        }

        .form-section {
            flex: 1;
            padding: 120px 40px 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 8%;
            position: relative;
            z-index: 2;
            background: transparent;
        }

        .auth-card {
            background-color: transparent;
            padding: 20px 0;
            border-radius: 40px;
            box-shadow: none;
            width: 100%;
            max-width: 480px;
        }

        .form-section h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 40px;
            color: #1a1a1a;
        }

        .mb-3, .mb-4 {
            margin-bottom: 25px;
        }

        .mb-3 input, .mb-4 input {
            width: 100%;
            padding: 18px 30px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 50px;
            background-color: #fff;
            font-size: 1rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mb-3 input:hover, .mb-4 input:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.1);
            z-index: 5;
        }

        .mb-3 input:focus, .mb-4 input:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            transform: scale(1.05);
        }

        .mb-3 input::placeholder, .mb-4 input::placeholder {
            color: #888;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .btn-submit {
            background-color: #1a1a1a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        .btn-submit:hover {
            background-color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .form-label {
            color: #1a1a1a;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .text-center a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .text-center a:hover {
            color: #c5a017;
        }

        .text-center-title {
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .text-center-subtitle {
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="container-main">
        <div class="diagonal-bg"></div>
        <div class="form-section">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <h2 style="color: #d4af37; margin-bottom: 10px;">CRIAR CONTA</h2>
                    <p class="text-center-subtitle">Preencha os dados abaixo</p>
                </div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" name="name" placeholder="Seu nome" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" placeholder="seuemail@gmail.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input type="password" name="password" placeholder="*********" required>
                    </div>

                    <button type="submit" class="btn-submit">Cadastrar</button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0" style="color: #1a1a1a;">Já tem uma conta? <a href="login.html">Faça login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Função simples para aplicar a máscara de telefone brasileiro
        const telInput = document.getElementById('phone');

        telInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ""); // Remove tudo que não é dígito

            if (value.length > 11) value = value.slice(0, 11); // Limita a 11 dígitos

            // Aplica a formatação dinamicamente
            if (value.length > 10) {
                // Formato (99) 99999-9999
                value = value.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            } else if (value.length > 6) {
                // Formato (99) 9999-9999
                value = value.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
            } else if (value.length > 2) {
                // Formato (99) 9...
                value = value.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
            } else if (value.length > 0) {
                // Formato (99...
                value = value.replace(/^(\d*)/, "($1");
            }

            e.target.value = value;
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=register`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert('Cadastro realizado com sucesso! Faça login.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Erro no cadastro');
                }
            } catch (err) {
                alert('Erro de conexão');
            }
        });
    </script>
</body>

</html>
