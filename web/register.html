<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/index.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container d-flex justify-content-center">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <div class="menu-nav" id="nav-items">
                    <div class="nav-active-pill" id="nav-pill"></div>
                    <a href="index.html">INÍCIO</a>
                    <a href="#contato">CONTATO</a>
                    <a href="dashboard.html">AGENDAR</a>
                    <a href="login.html" class="btn-nav" id="btn-entrar">ENTRAR</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-main" style="margin-top: 80px;">
        <div class="diagonal-bg"></div>
        <div class="form-section">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <h2 style="color: #d4af37; margin-bottom: 10px;">CRIAR CONTA</h2>
                    <p class="text-center-subtitle">Preencha os dados abaixo</p>
                </div>

                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" name="name" placeholder="Seu nome" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" placeholder="seuemail@gmail.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input type="password" name="password" placeholder="*********" required>
                    </div>

                    <button type="submit" class="btn-submit">Cadastrar</button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0" style="color: #1a1a1a;">Já tem uma conta? <a href="login.html">Faça login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Função simples para aplicar a máscara de telefone brasileiro
        const telInput = document.getElementById('phone');

        telInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ""); // Remove tudo que não é dígito

            if (value.length > 11) value = value.slice(0, 11); // Limita a 11 dígitos

            // Aplica a formatação dinamicamente
            if (value.length > 10) {
                // Formato (99) 99999-9999
                value = value.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            } else if (value.length > 6) {
                // Formato (99) 9999-9999
                value = value.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
            } else if (value.length > 2) {
                // Formato (99) 9...
                value = value.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
            } else if (value.length > 0) {
                // Formato (99...
                value = value.replace(/^(\d*)/, "($1");
            }

            e.target.value = value;
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=register`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert('Cadastro realizado com sucesso! Faça login.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Erro no cadastro');
                }
            } catch (err) {
                alert('Erro de conexão');
            }
        });
    </script>
</body>

</html>
