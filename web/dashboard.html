<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Cliente - Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/index.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container d-flex justify-content-center" id="navcontent">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <div class="menu-nav" id="nav-items">
                <div class="nav-active-pill" id="nav-pill"></div>
                <a href="index.html">INÍCIO</a>
                <a href="#contato">CONTATO</a>
                <a href="dashboard.html" class="active">AGENDAR</a>
                <span class="navbar-text me-3" id="userName">Olá, Cliente</span>
                <a href="#" class="btn-nav btn-logout" id="btn-entrar" onclick="logout(); return false;">SAIR</a>
            </div>
        </div>
    </div>
</nav>

<div class="container dashboard-content">
    <div class="row">
            <!-- Lado esquerdo: Novo Agendamento -->
            <div class="col-md-6">
                <div class="dashboard-card">
                    <h4 class="mb-4">Novo Agendamento</h4>
                    <form id="bookForm">
                        <div class="mb-3">
                            <label class="form-label">1. Escolha o Serviço</label>
                            <select id="serviceSelect" name="service_id" class="form-select" required>
                                <option value="">Carregando serviços...</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">2. Escolha a Data (Terça a Sábado)</label>
                            <input type="date" id="dateInput" name="date" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">3. Escolha o Horário</label>
                            <div id="timesContainer" class="d-flex flex-wrap gap-2">
                                <p class="text-muted small">Selecione uma data para ver os horários disponíveis.</p>
                            </div>
                            <input type="hidden" id="timeInput" name="time" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Confirmar Agendamento</button>
                    </form>
                </div>
            </div>

            <!-- Lado direito: Meus Agendamentos -->
            <div class="col-md-6">
                <div class="dashboard-card">
                    <h4 class="mb-4">Meus Agendamentos</h4>
                    <div id="appointmentsList" class="list-group">
                        <p class="text-muted">Carregando...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        // Executa ao carregar a página
        document.addEventListener('DOMContentLoaded', async () => {
            // Proteção de rota: Verifica se o usuário está logado
            const auth = await checkAuth();
            if (!auth.logged_in) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userName').innerText = `Olá, ${auth.user.name}`;

            // Regra de UI: Impede agendamentos para datas passadas
            const dateInput = document.getElementById('dateInput');
            dateInput.min = new Date().toISOString().split('T')[0];

            // Inicializa dados da página
            loadServices();
            loadMyAppointments();
        });

        /**
         * Carrega a lista de serviços disponíveis no dropdown.
         */
        async function loadServices() {
            const res = await fetch(`${API_BASE}/appointments.php?action=services`, { credentials: 'include' });
            const data = await res.json();
            const select = document.getElementById('serviceSelect');
            select.innerHTML = '<option value="">Selecione um serviço</option>';
            if (data.services) {
                data.services.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.name} - R$ ${s.price}</option>`;
                });
            }
        }

        /**
         * Escuta mudanças na data para buscar horários disponíveis dinamicamente.
         */
        document.getElementById('dateInput').addEventListener('change', async (e) => {
            const date = e.target.value;
            const res = await fetch(`${API_BASE}/appointments.php?action=available_times&date=${date}`, { credentials: 'include' });
            const data = await res.json();

            const container = document.getElementById('timesContainer');
            container.innerHTML = ''; // Limpa horários anteriores
            document.getElementById('timeInput').value = ''; // Reseta seleção

            if (data.error) {
                container.innerHTML = `<p class="text-danger small">${data.error}</p>`;
                return;
            }

            // Renderiza os horários como pequenos botões (badges)
            if (data.times && data.times.length > 0) {
                data.times.forEach(t => {
                    const badge = document.createElement('span');
                    badge.className = 'badge border text-dark time-slot p-2';
                    badge.innerText = t;
                    badge.onclick = () => selectTime(badge, t);
                    container.appendChild(badge);
                });
            } else {
                container.innerHTML = '<p class="text-muted small">Nenhum horário disponível para esta data.</p>';
            }
        });

        /**
         * Gerencia a seleção visual do horário.
         */
        function selectTime(element, time) {
            document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('timeInput').value = time;
        }


        /**
        * Retorna a data/hora atual no fuso de Brasília (America/Sao_Paulo).
        * Usa Intl.DateTimeFormat para garantir o fuso correto independente do
        * fuso do dispositivo do usuário.
        */
        function getBrasiliaNow() {
            const parts = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'America/Sao_Paulo',
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', hour12: false
            }).formatToParts(new Date()).reduce((acc, p) => {
                acc[p.type] = p.value;
                return acc;
            }, {});
            return {
                date: `${parts.year}-${parts.month}-${parts.day}`, // YYYY-MM-DD
                time: `${parts.hour === '24' ? '00' : parts.hour}:${parts.minute}` // HH:MM
            };
        }

        // Envia o formulário de agendamento.
        document.getElementById('bookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const time = document.getElementById('timeInput').value;
            const date = document.getElementById('dateInput').value;
            if (!time) {
                alert('Por favor, selecione um horário.');
                return;
            }

            // Validação: se a data escolhida for hoje (Brasília), o horário
            // selecionado não pode ser anterior ao horário atual de Brasília.
            const nowBR = getBrasiliaNow();
            if (date === nowBR.date && time <= nowBR.time) {
                alert(`Horário inválido. ${time} é um horário passado. Escolha um horário futuro e tente novamente.`);
                return;
            }

            const formData = new FormData(e.target);
            const res = await fetch(`${API_BASE}/appointments.php?action=book`, {
                method: 'POST',
                body: formData,
                credentials: 'include'
            });
            const data = await res.json();

            if (res.ok && data.success) {
                alert(data.message);
                document.getElementById('bookForm').reset();
                document.getElementById('timesContainer').innerHTML = '<p class="text-muted small">Selecione uma data para ver os horários disponíveis.</p>';
                loadMyAppointments(); // Atualiza a lista lateral
            } else {
                alert(data.error);
            }
        });

        /**
         * Carrega o histórico de agendamentos do cliente.
         */
        async function loadMyAppointments() {
            const res = await fetch(`${API_BASE}/appointments.php?action=my_appointments`, { credentials: 'include' });
            const data = await res.json();
            const list = document.getElementById('appointmentsList');

            if (data.appointments && data.appointments.length > 0) {
                list.innerHTML = '';
                data.appointments.forEach(a => {
                    // Formatação de data para o padrão brasileiro
                    const dateObj = new Date(a.appointment_date + 'T' + a.appointment_time);
                    const dateStr = dateObj.toLocaleDateString('pt-BR');
                    const timeStr = a.appointment_time.substring(0, 5);

                    // Define cor do badge baseado no status
                    let badgeClass = 'bg-success';
                    if (a.status === 'pendente') badgeClass = 'bg-warning text-dark';
                    if (a.status === 'cancelado') badgeClass = 'bg-danger';

                    list.innerHTML += `
                    <div class="list-group-item">
                        <div class="d-flex w-100 justify-content-between">
                            <h6 class="mb-1 fw-bold">${a.service_name}</h6>
                            <small class="text-muted">${dateStr} às ${timeStr}</small>
                        </div>
                        <p class="mb-1 text-muted small">Valor: R$ ${a.price}</p>
                        <span class="badge ${badgeClass}">${a.status}</span>
                    </div>
                `;
                });
            } else {
                list.innerHTML = '<p class="text-muted small">Você ainda não possui agendamentos.</p>';
            }
        }
    </script>
</body>

</html>
