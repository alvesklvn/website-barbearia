<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-image: url('assets/imagens/barbearia_fundo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background-color: transparent !important;
            padding: 2rem 0;
            box-shadow: none !important;
        }

        .navbar-brand {
            display: none;
        }

        .container-main {
            display: flex;
            min-height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            background-color: transparent;
        }

        /* Camada branca diagonal */
        .diagonal-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            clip-path: polygon(0 0, 35% 0, 65% 100%, 0 100%);
            z-index: 1;
        }

        .form-section {
            flex: 1;
            padding: 120px 40px 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 8%;
            position: relative;
            z-index: 2;
            background: transparent;
        }

        .register-card {
            background-color: transparent;
            padding: 20px 0;
            border-radius: 40px;
            box-shadow: none;
            width: 100%;
            max-width: 480px;
        }

        .form-section h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 40px;
            color: #1a1a1a;
        }

        .mb-3 {
            margin-bottom: 25px;
        }

        .mb-3 input {
            width: 100%;
            padding: 18px 30px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 50px;
            background-color: #fff;
            font-size: 1rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mb-3 input:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.1);
            z-index: 5;
        }

        .mb-3 input:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            transform: scale(1.05);
        }

        .mb-3 input::placeholder {
            color: #888;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .btn-submit {
            background-color: #1a1a1a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background-color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .image-section {
            flex: 1;
            background: transparent;
            position: relative;
        }

        .image-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
        }

        .branded-text {
            position: absolute;
            bottom: 40px;
            right: 40px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            z-index: 2;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .menu-nav {
            display: flex;
            gap: 0;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1000;
        }

        .nav-active-pill {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.08);
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1;
            height: calc(100% - 10px);
            top: 5px;
            left: 5px;
        }

        .menu-nav a {
            color: #666;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 8px 25px;
            border-radius: 25px;
            transition: color 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 2;
            display: inline-block;
        }

        .menu-nav a.active {
            color: #000 !important;
        }

        .menu-nav a:hover {
            color: #000;
        }

        .menu-nav a.active:hover {
            color: #000 !important;
        }

        .btn-nav {
            background-color: #1a1a1a;
            color: #fff !important;
            padding: 8px 25px !important;
            border-radius: 25px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            z-index: 3;
            margin-left: 5px;
        }

        .btn-nav:hover {
            background-color: #000;
            transform: scale(1.05);
        }

        .btn-nav.btn-logout {
            background-color: transparent;
            border: 2px solid #d32f2f;
            color: #d32f2f !important;
        }

        .btn-nav.btn-logout:hover {
            background-color: #d32f2f;
            color: #fff !important;
        }

        .hero-when-logged {
            display: none;
            flex: 1;
            padding: 60px 40px;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
        }

        .hero-when-logged h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #1a1a1a;
            line-height: 1.2;
            text-align: center;
        }

        .hero-when-logged p {
            font-size: 1.2rem;
            color: #666;
            margin-top: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .container-main {
                flex-direction: column;
                margin-top: 70px;
            }

            .form-section {
                padding: 40px 20px;
            }

            .image-section {
                min-height: 400px;
            }

            .branded-text {
                writing-mode: horizontal-tb;
                transform: none;
                bottom: auto;
                top: 20px;
                right: auto;
                left: 20px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container d-flex justify-content-end">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <div class="menu-nav" id="nav-items">
                <div class="nav-active-pill" id="nav-pill"></div>
                <a href="#inicio" class="active">INÍCIO</a>
                <a href="#contato">CONTATO</a>
                <a href="#agendar">AGENDAR</a>
                <a href="login.html" class="btn-nav" id="btn-entrar">ENTRAR</a>
            </div>
        </div>
    </div>
</nav>

<div class="container-main" id="main-content">
    <div class="diagonal-bg"></div>
    <!-- Seção do formulário (quando não logado) -->
    <div class="form-section" id="form-section">
        <div class="register-card">
            <h2 style="font-size: 1.8rem; margin-bottom: 35px; text-align: left;">Cadastre-se</h2>
            <form id="registerForm">
                <div class="mb-3">
                    <input type="text" id="nome" name="name" placeholder="NOME COMPLETO" required>
                </div>
                <div class="mb-3">
                    <input type="email" id="email" name="email" placeholder="SEUEMAIL@GMAIL.COM" required>
                </div>
                <div class="mb-3">
                    <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="senha" name="password" placeholder="SENHA" required>
                </div>
                <button type="submit" class="btn-submit w-100" style="border-radius: 50px;">CADASTRAR</button>
            </form>
        </div>
    </div>

    <!-- Seção de imagem -->
    <div class="image-section" id="image-section">
        <div class="branded-text">Seu Estilo, Nossa Arte</div>
    </div>

    <!-- Hero section quando logado -->
    <div class="hero-when-logged" id="hero-when-logged">
        <div>
            <h1 id="principalbranding">Seu Estilo, Nossa Arte</h1>
            <p>Bem-vindo ao seu painel de agendamentos!</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>

<script>
                // Função simples para aplicar a máscara de telefone brasileiro
                const telInput = document.getElementById('phone');

                telInput.addEventListener('input', (e) => {
                    let value = e.target.value.replace(/\D/g, ""); // Remove tudo que não é dígito

                    if (value.length > 11) value = value.slice(0, 11); // Limita a 11 dígitos

                    // Aplica a formatação dinamicamente
                    if (value.length > 10) {
                        // Formato (99) 99999-9999
                        value = value.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
                    } else if (value.length > 6) {
                        // Formato (99) 9999-9999
                        value = value.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
                    } else if (value.length > 2) {
                        // Formato (99) 9...
                        value = value.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
                    } else if (value.length > 0) {
                        // Formato (99...
                        value = value.replace(/^(\d*)/, "($1");
                    }

                    e.target.value = value;
                });
            </script>

<script>
    function initNavPill() {
        const pill = document.getElementById('nav-pill');
        const items = document.querySelectorAll('.menu-nav a:not(.btn-logout)');
        const navContainer = document.getElementById('nav-items');

        function movePill(element) {
            if (!element) return;
            const rect = element.getBoundingClientRect();
            const containerRect = navContainer.getBoundingClientRect();
            
            pill.style.width = `${rect.width}px`;
            pill.style.left = `${rect.left - containerRect.left}px`;
        }

        function resetPill() {
            const activeItem = document.querySelector('.menu-nav a.active');
            if (activeItem) {
                movePill(activeItem);
            } else {
                pill.style.width = '0';
            }
        }

        items.forEach(item => {
            item.addEventListener('mouseenter', () => movePill(item));
            item.addEventListener('click', function() {
                items.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        navContainer.addEventListener('mouseleave', resetPill);

        // Posicionamento inicial
        setTimeout(resetPill, 100);
        
        // Reajustar em redimensionamento
        window.addEventListener('resize', resetPill);
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const auth = await checkAuth();
        
        // Inicializar o efeito da pílula deslizante
        initNavPill();

        if (auth.logged_in) {
            // Usuário está logado
            const mainContent = document.getElementById('main-content');
            const formSection = document.getElementById('form-section');
            const imageSection = document.getElementById('image-section');
            const heroWhenLogged = document.getElementById('hero-when-logged');
            
            // Ocultar formulário e imagem
            formSection.style.display = 'none';
            imageSection.style.display = 'none';
            
            // Mostrar hero section
            heroWhenLogged.style.display = 'flex';
            
            // Atualizar navbar
            const navItems = document.getElementById('nav-items');
            const dashboardLink = auth.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
            navItems.innerHTML = `
                <div class="nav-active-pill" id="nav-pill"></div>
                <a href="${dashboardLink}" class="active">MEU PAINEL</a>
                <a href="#" onclick="logout(); return false;" class="btn-nav btn-logout">SAIR</a>
            `;
            initNavPill();
        } else {
            // Usuário não está logado - mantém a visualização padrão
            document.getElementById('hero-when-logged').style.display = 'none';
        }
    });

    // Submissão do formulário de cadastro
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=register`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert('Cadastro realizado com sucesso! Faça login.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Erro no cadastro');
                }
            } catch (err) {
                alert('Erro de conexão');
            }
        });
</script>
</body>
</html>
