    <script>
        // Função simples para aplicar a máscara de telefone brasileiro
        const telInput = document.getElementById('phone');

        telInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ""); // Remove tudo que não é dígito

            if (value.length > 11) value = value.slice(0, 11); // Limita a 11 dígitos

            // Aplica a formatação dinamicamente
            if (value.length > 10) {
                // Formato (99) 99999-9999
                value = value.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            } else if (value.length > 6) {
                // Formato (99) 9999-9999
                value = value.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
            } else if (value.length > 2) {
                // Formato (99) 9...
                value = value.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
            } else if (value.length > 0) {
                // Formato (99...
                value = value.replace(/^(\d*)/, "($1");
            }

            e.target.value = value;
        });
    </script>

    <script>
        function initNavPill() {
            const pill = document.getElementById('nav-pill');
            const items = document.querySelectorAll('.menu-nav a:not(.btn-logout)');
            const navContainer = document.getElementById('nav-items');

            function movePill(element) {
                if (!element) return;
                const rect = element.getBoundingClientRect();
                const containerRect = navContainer.getBoundingClientRect();

                pill.style.width = `${rect.width}px`;
                pill.style.left = `${rect.left - containerRect.left}px`;
            }

            function resetPill() {
                const activeItem = document.querySelector('.menu-nav a.active');
                if (activeItem) {
                    movePill(activeItem);
                } else {
                    pill.style.width = '0';
                }
            }

            function updateActiveLink() {
                let currentPath = window.location.pathname.split('/').pop() || 'index.html';
                let currentHash = window.location.hash;

                items.forEach(i => i.classList.remove('active'));

                let exactMatch = Array.from(items).find(i => {
                    let href = i.getAttribute('href');
                    if (currentHash) {
                        return href === currentHash || href === currentPath + currentHash;
                    } else {
                        return href === currentPath || (currentPath === 'index.html' && href === '#inicio') || (currentPath === '' && href === 'index.html');
                    }
                });

                if (exactMatch) {
                    exactMatch.classList.add('active');
                } else if (items.length > 0) {
                    items[0].classList.add('active');
                }
                resetPill();
            }

            items.forEach(item => {
                item.addEventListener('mouseenter', () => movePill(item));
                // Retiramos o evento de click que forçava o active, para depender da URL
            });

            navContainer.addEventListener('mouseleave', resetPill);

            // Evitar duplicar listeners se initNavPill for chamado novamente
            window.removeEventListener('hashchange', window._navHashChangeListener);
            window.removeEventListener('resize', window._navResizeListener);

            window._navHashChangeListener = updateActiveLink;
            window._navResizeListener = resetPill;

            window.addEventListener('hashchange', window._navHashChangeListener);
            window.addEventListener('resize', window._navResizeListener);

            // Posicionamento inicial
            updateActiveLink();
            setTimeout(resetPill, 100);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const auth = await checkAuth();

            // Inicializar o efeito da pílula deslizante
            initNavPill();

            if (auth.logged_in && auth.user.role !== 'admin') {
                // Usuário está logado
                const formSection = document.getElementById('form-section');
                const heroContent = document.getElementById('hero-content');

                // Ocultar formulário e exibir conteudo ao meio
                formSection.style.display = 'none';
                heroContent.style.display = 'flex';

                // Atualizar navbar
                const navItems = document.getElementById('nav-items');
                navItems.innerHTML = `
                <div class="nav-active-pill" id="nav-pill"></div>
                <a href="index.html" class="active">INÍCIO</a>
                <a href="#contato">CONTATO</a>
                <a href="dashboard.html">AGENDAR</a>
                <a href="#" onclick="logout(); return false;" class="btn-nav btn-logout">SAIR</a>
            `;
                initNavPill();
            } else if (auth.logged_in && auth.user.role == 'admin') {
                // Usuário está logado
                const formSection = document.getElementById('form-section');
                const heroContent = document.getElementById('hero-content');

                // Ocultar formulário e exibir conteudo ao meio
                formSection.style.display = 'none';
                heroContent.style.display = 'flex';

                // Atualizar navbar
                const navItems = document.getElementById('nav-items');
                navItems.innerHTML = `
                <div class="nav-active-pill" id="nav-pill"></div>
                <a href="index.html" class="active">INÍCIO</a>
                <a href="#contato">CONTATO</a>
                <a href="admin.html">PAINEL DO BARBEIRO</a>
                <a href="#" onclick="logout(); return false;" class="btn-nav btn-logout">SAIR</a>
            `;
                initNavPill();
            }
        });

        // Submissão do formulário de cadastro
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=register`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert('Cadastro realizado com sucesso! Faça login.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Erro no cadastro');
                }
            } catch (err) {
                alert('Erro de conexão');
            }
        });

        // Função para mostrar o formulário de cadastro com transição
        function showRegister() {
            const welcome = document.getElementById('welcome-section');
            const register = document.getElementById('register-card');

            if (!welcome || !register) return;

            // Fade out do texto de boas-vindas
            welcome.style.opacity = '0';

            setTimeout(() => {
                welcome.style.display = 'none';
                register.style.display = 'block';
                // Pequeno delay para garantir que o display: block foi processado antes da opacidade
                setTimeout(() => {
                    register.style.opacity = '1';
                }, 50);
            }, 500);
        }

        // Função para voltar à tela de boas-vindas
        function showWelcome() {
            const welcome = document.getElementById('welcome-section');
            const register = document.getElementById('register-card');

            if (!welcome || !register) return;

            // Fade out do card de cadastro
            register.style.opacity = '0';
            
            setTimeout(() => {
                register.style.display = 'none';
                welcome.style.display = 'block';
                // Pequeno delay para garantir que o display: block foi processado antes da opacidade
                setTimeout(() => {
                    welcome.style.opacity = '1';
                }, 50);
            }, 500);
        }
    </script>
