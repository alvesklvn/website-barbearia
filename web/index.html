<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/index.css">
    <style>
        .register-card {
            background-color: #ffffff !important;
            /* Força o fundo branco */
            border-radius: 35px !important;
            /* Arredondamento forte */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15) !important;
            /* Sombra visível */
            padding: 50px 40px !important;
            display: block !important;
            /* Garante que ele se comporte como uma caixa */
            width: 100% !important;
            max-width: 450px !important;
            margin: 0 auto !important;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container d-flex justify-content-end">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="menu-nav" id="nav-items">
                    <div class="nav-active-pill" id="nav-pill"></div>
                    <a href="index.html" class="active">INÍCIO</a>
                    <a href="#contato">CONTATO</a>
                    <a href="dashboard.html">AGENDAR</a>
                    <a href="login.html" class="btn-nav" id="btn-entrar">ENTRAR</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-main" id="main-content">
        <!-- Seção do formulário (quando não logado) -->
        <div class="form-section" id="form-section">
            <div class="register-card">
                <h2 style="font-size: 1.8rem; color: #d4af35; margin-bottom: 35px; text-align: left;">Cadastre-se
                </h2>
                <form id="registerForm">
                    <div class="mb-3">
                        <input type="text" id="nome" name="name" placeholder="NOME COMPLETO" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" id="email" name="email" placeholder="SEUEMAIL@GMAIL.COM" required>
                    </div>
                    <div class="mb-3">
                        <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="senha" name="password" placeholder="SENHA" required>
                    </div>
                    <button type="submit" class="btn-submit w-100" style="border-radius: 50px;">CADASTRAR</button>
                </form>
            </div>
        </div>

        <!-- Seção de imagem -->
        <div class="image-section" id="image-section">
            <div class="hero-content" id="hero-content" style="display: none;">
                <div class="branded-text">Seu Estilo, Nossa Arte</div>
                <a href="dashboard.html" class="btn-agendar-hero">Agendar Horário</a>
            </div>
        </div>


    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>

    <script>
        // Função simples para aplicar a máscara de telefone brasileiro
        const telInput = document.getElementById('phone');

        telInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ""); // Remove tudo que não é dígito

            if (value.length > 11) value = value.slice(0, 11); // Limita a 11 dígitos

            // Aplica a formatação dinamicamente
            if (value.length > 10) {
                // Formato (99) 99999-9999
                value = value.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            } else if (value.length > 6) {
                // Formato (99) 9999-9999
                value = value.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
            } else if (value.length > 2) {
                // Formato (99) 9...
                value = value.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
            } else if (value.length > 0) {
                // Formato (99...
                value = value.replace(/^(\d*)/, "($1");
            }

            e.target.value = value;
        });
    </script>

    <script>
        function initNavPill() {
            const pill = document.getElementById('nav-pill');
            const items = document.querySelectorAll('.menu-nav a:not(.btn-logout)');
            const navContainer = document.getElementById('nav-items');

            function movePill(element) {
                if (!element) return;
                const rect = element.getBoundingClientRect();
                const containerRect = navContainer.getBoundingClientRect();

                pill.style.width = `${rect.width}px`;
                pill.style.left = `${rect.left - containerRect.left}px`;
            }

            function resetPill() {
                const activeItem = document.querySelector('.menu-nav a.active');
                if (activeItem) {
                    movePill(activeItem);
                } else {
                    pill.style.width = '0';
                }
            }

            function updateActiveLink() {
                let currentPath = window.location.pathname.split('/').pop() || 'index.html';
                let currentHash = window.location.hash;

                items.forEach(i => i.classList.remove('active'));

                let exactMatch = Array.from(items).find(i => {
                    let href = i.getAttribute('href');
                    if (currentHash) {
                        return href === currentHash || href === currentPath + currentHash;
                    } else {
                        return href === currentPath || (currentPath === 'index.html' && href === '#inicio') || (currentPath === '' && href === 'index.html');
                    }
                });

                if (exactMatch) {
                    exactMatch.classList.add('active');
                } else if (items.length > 0) {
                    items[0].classList.add('active');
                }
                resetPill();
            }

            items.forEach(item => {
                item.addEventListener('mouseenter', () => movePill(item));
                // Retiramos o evento de click que forçava o active, para depender da URL
            });

            navContainer.addEventListener('mouseleave', resetPill);

            // Evitar duplicar listeners se initNavPill for chamado novamente
            window.removeEventListener('hashchange', window._navHashChangeListener);
            window.removeEventListener('resize', window._navResizeListener);

            window._navHashChangeListener = updateActiveLink;
            window._navResizeListener = resetPill;

            window.addEventListener('hashchange', window._navHashChangeListener);
            window.addEventListener('resize', window._navResizeListener);

            // Posicionamento inicial
            updateActiveLink();
            setTimeout(resetPill, 100);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const auth = await checkAuth();

            // Inicializar o efeito da pílula deslizante
            initNavPill();

            if (auth.logged_in) {
                // Usuário está logado
                const formSection = document.getElementById('form-section');
                const heroContent = document.getElementById('hero-content');

                // Ocultar formulário e exibir conteudo ao meio
                formSection.style.display = 'none';
                heroContent.style.display = 'flex';

                // Atualizar navbar
                const navItems = document.getElementById('nav-items');
                navItems.innerHTML = `
                <div class="nav-active-pill" id="nav-pill"></div>
                <a href="index.html" class="active">INÍCIO</a>
                <a href="#contato">CONTATO</a>
                <a href="dashboard.html">AGENDAR</a>
                <a href="#" onclick="logout(); return false;" class="btn-nav btn-logout">SAIR</a>
            `;
                initNavPill();
            }
        });

        // Submissão do formulário de cadastro
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=register`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert('Cadastro realizado com sucesso! Faça login.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Erro no cadastro');
                }
            } catch (err) {
                alert('Erro de conexão');
            }
        });
    </script>
</body>

</html>
