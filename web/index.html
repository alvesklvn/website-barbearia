<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'Inter', sans-serif;
        }

        .navbar {
            background-color: #1a1a1a !important;
            padding: 1rem 0;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: #d4af37 !important;
        }

        .container-main {
            display: flex;
            align-items: stretch;
            min-height: 100vh;
            margin-top: 80px;
        }

        .form-section {
            flex: 1;
            background-color: #f5f5f5;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-section h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 40px;
            color: #1a1a1a;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background-color: #e8e8e8;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background-color: #d0d0d0;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .btn-submit {
            background-color: #d4af37;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background-color: #c9a427;
        }

        .image-section {
            flex: 1;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            background-image: url('/web/assets/imagens/barbearia.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .image-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
        }

        .branded-text {
            position: absolute;
            bottom: 40px;
            right: 40px;
            color: #d4af37;
            font-size: 1.3rem;
            font-weight: 600;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            z-index: 2;
        }

        .menu-nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .menu-nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .menu-nav a:hover {
            color: #d4af37;
        }

        .btn-nav {
            background-color: #d4af37;
            color: #1a1a1a;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-nav:hover {
            background-color: #c9a427;
        }

        .hero-when-logged {
            display: none;
            flex: 1;
            padding: 60px 40px;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
        }

        .hero-when-logged h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #1a1a1a;
            line-height: 1.2;
            text-align: center;
        }

        .hero-when-logged p {
            font-size: 1.2rem;
            color: #666;
            margin-top: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .container-main {
                flex-direction: column;
                margin-top: 70px;
            }

            .form-section {
                padding: 40px 20px;
            }

            .image-section {
                min-height: 400px;
            }

            .branded-text {
                writing-mode: horizontal-tb;
                transform: none;
                bottom: auto;
                top: 20px;
                right: auto;
                left: 20px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">BARBER</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <div class="menu-nav" id="nav-items">
                <a href="#inicio">INÍCIO</a>
                <a href="#contato">CONTATO</a>
                <a href="#agendar">AGENDAR</a>
                <a href="login.html" class="btn-nav" id="btn-entrar">ENTRAR</a>
            </div>
        </div>
    </div>
</nav>

<div class="container-main" id="main-content">
    <!-- Seção do formulário (quando não logado) -->
    <div class="form-section" id="form-section">
        <div>
            <h2>Cadastre-se</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="nome">NOME</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                </div>
                <div class="form-group">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email" placeholder="Seu melhor email" required>
                </div>
                <div class="form-group">
                    <label for="telefone">TELEFONE</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                </div>
                <div class="form-group">
                    <label for="senha">SENHA</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite uma senha segura" required>
                </div>
                <button type="submit" class="btn-submit w-100">CADASTRAR</button>
            </form>
        </div>
    </div>

    <!-- Seção de imagem -->
    <div class="image-section" id="image-section">
        <div class="branded-text">Seu Estilo, Nossa Arte</div>
    </div>

    <!-- Hero section quando logado -->
    <div class="hero-when-logged" id="hero-when-logged">
        <div>
            <h1 id="principalbranding">Seu Estilo, Nossa Arte</h1>
            <p>Bem-vindo ao seu painel de agendamentos!</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const auth = await checkAuth();
        
        if (auth.logged_in) {
            // Usuário está logado
            const mainContent = document.getElementById('main-content');
            const formSection = document.getElementById('form-section');
            const imageSection = document.getElementById('image-section');
            const heroWhenLogged = document.getElementById('hero-when-logged');
            
            // Ocultar formulário e imagem
            formSection.style.display = 'none';
            imageSection.style.display = 'none';
            
            // Mostrar hero section
            heroWhenLogged.style.display = 'flex';
            
            // Atualizar navbar
            const navItems = document.getElementById('nav-items');
            const dashboardLink = auth.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
            navItems.innerHTML = `
                <a href="${dashboardLink}">MEU PAINEL</a>
                <a href="#" onclick="logout(); return false;" class="btn-nav" style="color: #d32f2f; background-color: transparent; border: 2px solid #d32f2f;">SAIR</a>
            `;
        } else {
            // Usuário não está logado - mantém a visualização padrão
            document.getElementById('hero-when-logged').style.display = 'none';
        }
    });

    // Submissão do formulário de cadastro
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = {
            name: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('telefone').value,
            password: document.getElementById('senha').value
        };

        try {
            const response = await fetch('api/auth.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    action: 'register',
                    ...formData
                })
            });

            const data = await response.json();
            if (data.success) {
                alert('Cadastro realizado com sucesso! Faça login para continuar.');
                window.location.href = 'login.html';
            } else {
                alert('Erro ao cadastrar: ' + (data.message || 'Tente novamente'));
            }
        } catch (error) {
            console.error('Erro:', error);
            alert('Erro ao processar o cadastro');
        }
    });
</script>
</body>
</html>
