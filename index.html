<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Vip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html" style="color: #d4af37;">BARBEARIA VIP</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav" id="nav-items">
                <li class="nav-item"><a class="nav-link" href="login.html">Entrar</a></li>
                <li class="nav-item"><a class="btn btn-primary ms-2" href="register.html">Cadastre-se</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <h1 class="display-3 fw-bold mb-4">Seu Estilo, Nossa Arte</h1>
        <p class="lead mb-5">Agende seu horário de forma rápida e prática.</p>
        <a href="register.html" class="btn btn-primary btn-lg px-5 py-3">Agendar Agora</a>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const auth = await checkAuth();
        if (auth.logged_in) {
            const navItems = document.getElementById('nav-items');
            const dashboardLink = auth.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
            navItems.innerHTML = `
                <li class="nav-item"><a class="nav-link" href="${dashboardLink}">Meu Painel</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()">Sair</a></li>
            `;
        }
    });
</script>
</body>
</html>
